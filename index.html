<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JitneyLogic | Secure Terminal</title>
    <style>
        /* * JITNEYLOGIC: MATTE MAXIMALIST (NEOBRUTALIST) SYSTEM */
        :root {
            --jitney-purple: hsl(259, 30%, 42%);
            --stark-white: #f8fafc;
            --charcoal: #18181b;
            --sage-green: #4C9170;
            --gold-accent: #d97706;
            --border-width: 4px;
            --shadow-depth: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--jitney-purple);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--charcoal);
        }

        /* The Main Terminal Card */
        .terminal-card {
            background-color: var(--stark-white);
            border: var(--border-width) solid var(--charcoal);
            box-shadow: var(--shadow-depth) var(--shadow-depth) 0px var(--charcoal);
            width: 100%;
            max-width: 650px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Branding Header */
        .brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--charcoal);
            padding-bottom: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--sage-green);
            border: 2px solid var(--charcoal);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        /* Typography */
        h1 {
            font-size: clamp(2rem, 5vw, 2.75rem);
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            min-height: 2.2em; /* Prevents the box from jumping when text changes */
        }

        p.subtext {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
        }

        /* Video Container - Forces 16:9 Aspect Ratio */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Ratio */
            border: var(--border-width) solid var(--charcoal);
            background-color: var(--charcoal);
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Neobrutalist Action Button */
        .action-btn {
            display: block;
            width: 100%;
            background-color: var(--sage-green);
            color: var(--stark-white);
            text-align: center;
            padding: 18px 24px;
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1px;
            border: var(--border-width) solid var(--charcoal);
            box-shadow: 6px 6px 0px var(--charcoal);
            transition: all 0.15s ease-in-out;
            cursor: pointer;
            margin-top: 10px;
        }

        /* The Hover & Press Effects */
        .action-btn:hover {
            background-color: var(--gold-accent);
            color: var(--charcoal);
        }

        .action-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px var(--charcoal);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        @media (max-width: 480px) {
            .terminal-card {
                padding: 30px 20px;
                box-shadow: 6px 6px 0px var(--charcoal);
            }
        }
    </style>
</head>
<body>

    <div class="terminal-card">
        
        <div class="brand-header">
            <span>JITNEYLOGIC // ARCHITECTURE</span>
            <span><span class="status-dot"></span>SYSTEM LIVE</span>
        </div>

        <h1 id="hero-headline">Stop Babysitting The Floor. Start Engineering It.</h1>
        
        <p class="subtext">You've reached the end of the manual. Hit play to see the actual engine running our frontline sales architecture.</p>

       <div style="padding:56.25% 0 0 0;position:relative; border: var(--border-width) solid var(--charcoal); background-color: var(--charcoal); overflow: hidden;">
            <iframe src="https://player.vimeo.com/video/1209732458?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="JitneyLogic Closer Cockpit"></iframe>
        </div>
        <script src="https://player.vimeo.com/api/player.js"></script>

        <a href="#" class="action-btn"
           onmouseover="document.getElementById('hero-headline').innerText='Friction Costs You Deals. Watch How We Kill It.';"
           onmouseout="document.getElementById('hero-headline').innerText='Stop Babysitting The Floor. Start Engineering It.';">
           Secure Executive Briefing
        </a>

    </div>

</body>
</html>
